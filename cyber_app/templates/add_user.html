{% extends 'base.html' %}
{% block page_title %}Add User{% endblock %}
{% block page_sub %}Register a new analyst or administrator{% endblock %}
{% block content %}
<div style="max-width:600px;">
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">
        <i class="bi bi-person-plus-fill" style="color:#10b981"></i> New User
      </div>
      <a href="/users" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group span2">
            <label class="form-label">Full Name *</label>
            <input class="form-input" type="text" name="name" placeholder="e.g. Alice Johnson" required>
          </div>
          <div class="form-group span2">
            <label class="form-label">Email Address *</label>
            <input class="form-input" type="email" name="email" placeholder="alice@soc.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <input class="form-input" type="text" name="role" placeholder="e.g. Analyst, Manager">
          </div>
          <div class="form-group">
            <label class="form-label">Department</label>
            <input class="form-input" type="text" name="department" placeholder="e.g. Security Operations">
          </div>
        </div>
        <div style="margin-top:28px;display:flex;gap:12px;">
          <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Add User</button>
          <a href="/users" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

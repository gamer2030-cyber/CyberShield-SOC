{% extends 'base.html' %}
{% block page_title %}New Incident{% endblock %}
{% block page_sub %}Report a new security incident{% endblock %}
{% block content %}
<div style="max-width:780px;">
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">
        <i class="bi bi-plus-circle-fill" style="color:#6366f1"></i> Incident Details
      </div>
      <a href="/incidents" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="form-grid">
          <div class="form-group span2">
            <label class="form-label">Incident Title *</label>
            <input class="form-input" type="text" name="title" placeholder="e.g. Phishing Campaign Detected" required>
          </div>
          <div class="form-group span2">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" name="description" placeholder="Describe what happened..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Severity</label>
            <select class="form-select" name="severity">
              <option>Low</option><option>Medium</option>
              <option selected>High</option><option>Critical</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <input class="form-input" type="text" name="category" placeholder="e.g. Phishing, Malware">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" name="status">
              <option>Open</option><option>In Progress</option><option>Closed</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Affected Asset</label>
            <input class="form-input" type="text" name="affected_asset" placeholder="e.g. Email Server">
          </div>
        </div>
        <div style="margin-top:28px;display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Submit Incident</button>
          <a href="/incidents" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
